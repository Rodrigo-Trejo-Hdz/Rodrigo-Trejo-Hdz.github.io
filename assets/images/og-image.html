<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image — Rodrigo Trejo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #FAFAF8;
            color: #1A1A1A;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Radial gradient background */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 10% 20%, rgba(30, 58, 95, 0.10), transparent 55%),
                radial-gradient(ellipse at 90% 80%, rgba(194, 112, 61, 0.08), transparent 55%);
        }

        .card {
            position: relative;
            width: 1100px;
            height: 540px;
            background: #FFFFFF;
            border: 1px solid rgba(30, 58, 95, 0.18);
            border-radius: 24px;
            display: flex;
            align-items: center;
            padding: 60px 72px;
            gap: 60px;
            box-shadow: 0 20px 80px rgba(30, 58, 95, 0.10);
        }

        /* Left column */
        .left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .eyebrow {
            font-size: 14px;
            font-weight: 600;
            color: #A85E31;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .eyebrow::before {
            content: '';
            width: 36px;
            height: 2px;
            background: #C2703D;
            flex-shrink: 0;
        }

        .name {
            font-size: 58px;
            font-weight: 900;
            line-height: 1.05;
            margin-bottom: 14px;
            color: #1E3A5F;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            color: #C2703D;
            margin-bottom: 32px;
        }

        .tagline {
            font-size: 15px;
            color: #5A5A5A;
            line-height: 1.7;
            max-width: 460px;
        }

        /* Right column */
        .right {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            flex-shrink: 0;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .skill-pill {
            padding: 8px 18px;
            background: #EEF2F6;
            border: 1px solid rgba(30, 58, 95, 0.20);
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            color: #1E3A5F;
            text-align: center;
            white-space: nowrap;
        }

        .divider {
            width: 1px;
            height: 360px;
            background: linear-gradient(to bottom, transparent, rgba(30, 58, 95, 0.25), transparent);
            flex-shrink: 0;
        }

        /* Footer bar */
        .footer {
            position: absolute;
            bottom: 28px;
            left: 72px;
            right: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, #1E3A5F, #2E6E68);
            color: #FFFFFF;
            font-size: 15px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .url {
            font-size: 13px;
            color: #5A5A5A;
            letter-spacing: 0.5px;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <!-- Left column -->
        <div class="left">
            <div class="eyebrow">Portfolio</div>
            <div class="name">Rodrigo<br>Trejo</div>
            <div class="title">Analytics Engineer · Data Scientist</div>
            <div class="tagline">
                Building data infrastructure and ML systems at Data Bunker.<br>
                2+ years delivering pricing intelligence for FEMSA, Danone & Coppel.
            </div>
        </div>

        <div class="divider"></div>

        <!-- Right column -->
        <div class="right">
            <div class="skills-grid">
                <div class="skill-pill">Python</div>
                <div class="skill-pill">AWS</div>
                <div class="skill-pill">SQL</div>
                <div class="skill-pill">Power BI</div>
                <div class="skill-pill">React</div>
                <div class="skill-pill">PySpark</div>
                <div class="skill-pill">Scikit-learn</div>
                <div class="skill-pill">ETL / ELT</div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="logo">RT</div>
            <div class="url">rodrigo-trejo-hdz.github.io</div>
        </div>
    </div>
</body>
</html>
