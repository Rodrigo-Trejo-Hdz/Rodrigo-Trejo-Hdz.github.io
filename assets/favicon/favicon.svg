<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#151b3d"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#9d4edd"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="62" height="62" x="1" y="1" rx="13" ry="13" fill="none" stroke="url(#text-grad)" stroke-width="1.5" opacity="0.6"/>
  <!-- Initials RT -->
  <text
    x="32"
    y="44"
    font-family="'Inter', 'Segoe UI', Arial, sans-serif"
    font-size="28"
    font-weight="900"
    text-anchor="middle"
    fill="url(#text-grad)"
    letter-spacing="-1"
  >RT</text>
</svg>
